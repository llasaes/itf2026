<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google UI Dummy</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      color: #202124;
    }

    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 24px;
      gap: 18px;
      font-size: 14px;
    }

    header a {
      text-decoration: none;
      color: #202124;
    }

    header a:hover {
      text-decoration: underline;
    }

    .apps {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .apps:hover {
      background: #f1f3f4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 4px);
      gap: 4px;
    }

    .grid span {
      width: 4px;
      height: 4px;
      background: #5f6368;
      border-radius: 50%;
    }

    .profile {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #4285f4;
      color: white;
      display: grid;
      place-items: center;
      font-weight: bold;
      cursor: pointer;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding-bottom: 120px;
    }

    .logo {
      font-size: 5rem;
      font-weight: 500;
      letter-spacing: -4px;
      margin-bottom: 28px;
      user-select: none;
    }

    .blue { color: #4285f4; }
    .red { color: #ea4335; }
    .yellow { color: #fbbc05; }
    .green { color: #34a853; }

    .search-container {
      width: 100%;
      max-width: 580px;
      padding: 0 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid #dfe1e5;
      border-radius: 999px;
      padding: 14px 20px;
      box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
      transition: box-shadow 0.2s ease;
    }

    .search-box:hover {
      box-shadow: 0 2px 10px rgba(32, 33, 36, 0.15);
    }

    .search-icon,
    .mic-icon {
      color: #9aa0a6;
      font-size: 18px;
    }

    .search-input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .buttons button {
      border: 1px solid #f8f9fa;
      background: #f8f9fa;
      padding: 10px 18px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .buttons button:hover {
      border-color: #dadce0;
    }

    .language {
      margin-top: 28px;
      font-size: 13px;
    }

    .language a {
      color: #1a0dab;
      text-decoration: none;
      margin: 0 4px;
    }

    .language a:hover {
      text-decoration: underline;
    }

    footer {
      background: #f2f2f2;
      color: #70757a;
      font-size: 14px;
    }

    .footer-top {
      padding: 15px 30px;
      border-bottom: 1px solid #dadce0;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 15px 30px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: #70757a;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .logo {
        font-size: 4rem;
      }

      .footer-bottom {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="#">Gmail</a>
    <a href="#">Images</a>

    <div class="apps">
      <div class="grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="profile">U</div>
  </header>

  <main>
    <div class="logo" aria-label="Google logo">
      <span class="blue">T</span>
      <span class="red">E</span>
      <span class="yellow">S</span>
      <span class="blue">T</span>
      <span class="green">Y</span>
      <span class="red">e</span>
    </div>

    <div class="search-container">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          type="text"
          placeholder="Search Google or type a URL"
        />
        <span class="mic-icon">🎤</span>
      </div>

      <div class="buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
      </div>

      <div class="language">
        Google offered in:
        <a href="#">Español</a>
        <a href="#">Français</a>
        <a href="#">Deutsch</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-top">Mexico</div>

    <div class="footer-bottom">
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>

      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>
</body>
</html>
